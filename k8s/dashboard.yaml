apiVersion: v1
kind: ServiceAccount
metadata:
  name: dashboard-sa
  namespace: default

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: pod-reader
  namespace: default
rules:
- apiGroups: ["apps"]
  resources: ["deployments"]
  verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: read-pods
  namespace: default
subjects:
- kind: ServiceAccount
  name: dashboard-sa
  namespace: default
roleRef:
  kind: Role
  name: pod-reader
  apiGroup: rbac.authorization.k8s.io

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: scaling-dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: scaling-dashboard
  template:
    metadata:
      labels:
        app: scaling-dashboard
    spec:
      serviceAccountName: dashboard-sa
      containers:
      - name: dashboard
        image: email-system:latest
        command: ["./dashboard"]
        env:
        - name: RABBITMQ_URL
          value: "amqp://guest:guest@campaign_rabbitmq:5672/"
        - name: PORT
          value: "8080"
        ports:
        - containerPort: 8080

---
apiVersion: v1
kind: Service
metadata:
  name: scaling-dashboard-service
spec:
  type: NodePort
  selector:
    app: scaling-dashboard
  ports:
  - port: 8080
    targetPort: 8080
    nodePort: 30080
