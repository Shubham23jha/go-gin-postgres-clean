version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: campaign_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Shubham@21082
      POSTGRES_DB: goDb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  rabbitmq:
    image: rabbitmq:3-management
    container_name: campaign_rabbitmq
    ports:
      - "5672:5672"   # AMQP
      - "15672:15672" # Management UI
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    restart: always

volumes:
  postgres_data:
