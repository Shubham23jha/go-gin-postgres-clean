<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email System | Trigger Scaling</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text: #f8fafc;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            background-image: radial-gradient(circle at top right, rgba(99, 102, 241, 0.15), transparent),
                              radial-gradient(circle at bottom left, rgba(79, 70, 229, 0.1), transparent);
            color: var(--text);
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
            background: linear-gradient(to right, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            color: #94a3b8;
            margin-bottom: 32px;
            font-size: 14px;
        }

        .input-group {
            margin-bottom: 24px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 600;
            color: #cbd5e1;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: white;
            font-size: 16px;
            box-sizing: border-box;
            transition: all 0.2s;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.2);
        }

        button {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        button:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .status {
            margin-top: 24px;
            padding: 12px;
            border-radius: 12px;
            font-size: 14px;
            display: none;
        }

        .status.success {
            display: block;
            background: rgba(34, 197, 94, 0.1);
            color: #4ade80;
            border: 1px solid rgba(34, 197, 94, 0.2);
        }

        .status.error {
            display: block;
            background: rgba(239, 68, 68, 0.1);
            color: #f87171;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .loader {
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
            display: none;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading .loader { display: block; }
        .loading span { display: none; }
    </style>
</head>
<body>
    <div class="glass-card">
        <h1>Trigger Scaling Demo</h1>
        <p class="subtitle">Enter the number of recipients to test auto-scaling.</p>
        
        <div class="input-group">
            <label for="recipientCount">Number of Recipients</label>
            <input type="number" id="recipientCount" value="10" min="1" max="100">
        </div>

        <button id="sendBtn">
            <div class="loader"></div>
            <span>🚀 Start Campaign</span>
        </button>

        <div id="statusBox" class="status"></div>
    </div>

    <script>
        const sendBtn = document.getElementById('sendBtn');
        const statusBox = document.getElementById('statusBox');
        const recipientCount = document.getElementById('recipientCount');

        sendBtn.addEventListener('click', async () => {
            const count = parseInt(recipientCount.value);
            if (isNaN(count) || count < 1) return;

            sendBtn.classList.add('loading');
            sendBtn.disabled = true;
            statusBox.style.display = 'none';

            // Generate recipient list
            const recipients = Array.from({length: count}, (_, i) => `user${i+1}@example.com`);

            try {
                const response = await fetch('/api/campaigns/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        subject: "Scaling Test via UI",
                        body: `This is an automated test with ${count} recipients.`,
                        recipients: recipients
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    statusBox.className = 'status success';
                    statusBox.innerText = `✅ Campaign #${data.ID} started! Watch your dashboard scale up.`;
                } else {
                    throw new Error(data.error || 'Failed to trigger campaign');
                }
            } catch (err) {
                statusBox.className = 'status error';
                statusBox.innerText = `❌ Error: ${err.message}`;
            } finally {
                sendBtn.classList.remove('loading');
                sendBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
