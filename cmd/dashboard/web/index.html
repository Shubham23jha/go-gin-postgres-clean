<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scaling Dashboard | Email Worker System</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --primary: #38bdf8;
            --secondary: #fb923c;
            --text: #f8fafc;
            --muted: #94a3b8;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            width: 100%;
            padding: 2rem;
            text-align: center;
            background: linear-gradient(180deg, rgba(56, 189, 248, 0.1) 0%, transparent 100%);
        }

        h1 { margin: 0; font-weight: 600; letter-spacing: -1px; }
        p.subtitle { color: var(--muted); margin-top: 0.5rem; }

        .container {
            width: 90%;
            max-width: 1000px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
            padding: 2rem;
        }

        .card {
            background-color: var(--card-bg);
            padding: 2rem;
            border-radius: 1.5rem;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
            text-align: center;
            transition: transform 0.3s ease;
        }

        .card:hover { transform: translateY(-5px); }

        .metric-value {
            font-size: 4rem;
            font-weight: 600;
            margin: 1rem 0;
            line-height: 1;
        }

        .metric-label { font-size: 1.25rem; color: var(--muted); }

        .queue-color { color: var(--secondary); }
        .worker-color { color: var(--primary); }

        .pods-container {
            grid-column: 1 / -1;
            background-color: var(--card-bg);
            padding: 2rem;
            border-radius: 1.5rem;
            min-height: 200px;
        }

        .pod-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 1.5rem;
            margin-top: 1.5rem;
        }

        .pod {
            width: 60px;
            height: 60px;
            background-color: var(--primary);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.4);
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .pod.dead {
            background-color: var(--muted);
            opacity: 0.3;
            box-shadow: none;
            animation: fadeOut 0.5s ease forwards;
        }

        @keyframes popIn {
            from { transform: scale(0); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        @keyframes fadeOut {
            to { transform: scale(0.8); opacity: 0; }
        }

        .status-bar {
            position: fixed;
            bottom: 2rem;
            padding: 0.75rem 1.5rem;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 2rem;
            backdrop-filter: blur(10px);
            font-size: 0.875rem;
            color: var(--muted);
        }

        .live-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            background-color: #22c55e;
            border-radius: 50%;
            margin-right: 0.5rem;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(34, 197, 94, 0); }
            100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
        }
    </style>
</head>
<body>
    <header>
        <h1>System Scaling Monitor</h1>
        <p class="subtitle">Live Visualization of KEDA Managed Workers</p>
    </header>

    <div class="container">
        <div class="card">
            <div class="metric-label">Emails Pending</div>
            <div id="queue-length" class="metric-value queue-color">0</div>
        </div>
        <div class="card">
            <div class="metric-label">Active Workers</div>
            <div id="worker-count" class="metric-value worker-color">0</div>
        </div>

        <div class="pods-container">
            <div class="metric-label">Worker Nodes</div>
            <div id="pod-grid" class="pod-grid">
                <!-- Pods will appear here -->
            </div>
        </div>
    </div>

    <div class="status-bar">
        <span class="live-dot"></span> Streaming Real-time Metrics
    </div>

    <script>
        const queueEl = document.getElementById('queue-length');
        const workerEl = document.getElementById('worker-count');
        const gridEl = document.getElementById('pod-grid');

        let currentWorkers = 0;

        const eventSource = new EventSource('/api/stats');

        eventSource.onmessage = (event) => {
            const data = JSON.parse(event.data);
            
            // Update labels
            queueEl.innerText = data.queue_length;
            workerEl.innerText = data.active_workers;

            // Update Pod Grid
            updatePodGrid(data.active_workers);
        };

        function updatePodGrid(count) {
            if (count === currentWorkers) return;

            if (count > currentWorkers) {
                // Add new pods
                for (let i = currentWorkers; i < count; i++) {
                    const pod = document.createElement('div');
                    pod.className = 'pod';
                    pod.innerText = 'W' + (i + 1);
                    gridEl.appendChild(pod);
                }
            } else {
                // Remove pods (fade them out)
                const pods = gridEl.querySelectorAll('.pod:not(.dead)');
                for (let i = pods.length - 1; i >= count; i--) {
                    pods[i].classList.add('dead');
                    setTimeout(() => pods[i].remove(), 500);
                }
            }
            currentWorkers = count;
        }

        eventSource.onerror = (err) => {
            console.error("EventSource failed:", err);
            document.querySelector('.status-bar').innerHTML = '<span class="live-dot" style="background-color: #ef4444"></span> Disconnected from server';
        };
    </script>
</body>
</html>
